# ==========================================================================
# BLOCK 1 — 4-WEEK PULL-FOCUS MESOCYCLE
# Goal: progress weighted pull-up toward a clean +38-39 kg single by Wk4,
#       on track for the +41 kg 3-month target.
# Athlete: 188cm / ~90kg BW. Current clean-ish single ~+35-37 kg.
# Split: Mon Heavy Pull / Tue Push A / Thu Volume Pull / Fri Push B / Sat Skill
# Wave:  Wk1 Accumulate -> Wk2 Build -> Wk3 Intensify -> Wk4 Deload
#
# RPE key: 8 = ~2 reps in reserve, 9 = ~1 RIR, 10 = true max.
# All load_kg = ADDED load on the belt unless noted (BW = bodyweight only).
# Eccentrics/holds are the highest-yield overload tools at your level —
# do not skip them. Keep front lever at TUCK until eccentrics are controlled.
# Fill in actual reps/loads as you go, same as your daily logs.
# ==========================================================================

program: Block 1 - Pull Focus
length_weeks: 4
bodyweight_kg: 90

# --------------------------------------------------------------------------
weeks:

  # ========================================================================
  - week: 1
    theme: Accumulation - rebuild volume, cap intensity at RPE 8
    days:

      - day: Mon
        focus: Heavy Pull
        exercises:
          - name: Weighted Pull Up
            notes: Main strength work. Stop each set with ~2 reps in reserve.
            target_rpe: 8
            sets:
              - reps: 3
                load_kg: 25
              - reps: 3
                load_kg: 25
              - reps: 3
                load_kg: 26
              - reps: 3
                load_kg: 26
          - name: Weighted Pull Up - Supramaximal Eccentric
            notes: Above-1RM lower only. 4-5 sec controlled descent. Assisted/jump to top.
            target_rpe: 8
            sets:
              - reps: 1
                load_kg: 42
              - reps: 1
                load_kg: 42
              - reps: 1
                load_kg: 42
          - name: Weighted Chin Up
            notes: Secondary vertical pull, supinated for biceps/lat balance.
            sets:
              - reps: 5
                load_kg: 17
              - reps: 5
                load_kg: 17

      - day: Tue
        focus: Push A - Heavy Dip
        exercises:
          - name: Weighted Dip
            notes: Primary push strength. Build on 3x6@35 from Jun 25.
            target_rpe: 8
            sets:
              - reps: 5
                load_kg: 35
              - reps: 5
                load_kg: 35
              - reps: 5
                load_kg: 35
              - reps: 5
                load_kg: 35
          - name: Pike Push Up
            notes: Vertical press for delts. Elevate feet for more load.
            sets:
              - reps: 10
              - reps: 10
              - reps: 10
          - name: Lateral Raise
            notes: Lateral delt - the missing piece for shoulder width. Light, strict, slow.
            sets:
              - reps: 15
                load_kg: 5
              - reps: 15
                load_kg: 5
              - reps: 15
                load_kg: 5

      - day: Thu
        focus: Volume Pull + horizontal
        exercises:
          - name: Weighted Pull Up
            notes: Volume at controlled load. Crisp reps, full ROM.
            target_rpe: 8
            sets:
              - reps: 6
                load_kg: 15
              - reps: 6
                load_kg: 15
              - reps: 6
                load_kg: 15
              - reps: 6
                load_kg: 15
          - name: Ring Row
            notes: NEW - horizontal pull, the gap in your logs. Feet forward = harder. Squeeze shoulder blades.
            sets:
              - reps: 12
              - reps: 12
              - reps: 12
          - name: Tuck Front Lever Raise
            notes: Stay tucked. Prioritise a controlled eccentric over height.
            sets:
              - reps: 8
              - reps: 8
              - reps: 8
          - name: L Sit Pull Up
            sets:
              - reps: 6
              - reps: 6

      - day: Fri
        focus: Push B - volume + rear delt
        exercises:
          - name: Weighted Ring Dip
            notes: Stability and push volume.
            sets:
              - reps: 8
                load_kg: 12.5
              - reps: 8
                load_kg: 12.5
              - reps: 8
                load_kg: 12.5
          - name: Archer Push Up
            sets:
              - reps: 10 each side
              - reps: 10 each side
              - reps: 10 each side
          - name: Ring Face Pull
            notes: NEW - rear delt + external rotation for shoulder health. Lead with the elbows.
            sets:
              - reps: 15
              - reps: 15
              - reps: 15
          - name: Bar Tricep Extension
            sets:
              - reps: to failure
              - reps: to failure
              - reps: to failure

      - day: Sat
        focus: Skill - light, quality only
        exercises:
          - name: Tuck Front Lever Hold
            notes: Max-quality holds, perfect tuck. Stop set when tuck loosens.
            sets:
              - duration_s: 12
              - duration_s: 12
              - duration_s: 12
          - name: L Sit Hold
            sets:
              - duration_s: 15
              - duration_s: 15
              - duration_s: 15
          - name: Scapular Pull Up
            notes: Bulletproofing for the scap under heavy pull loads.
            sets:
              - reps: 10
              - reps: 10

  # ========================================================================
  - week: 2
    theme: Build - add load and a top-end double/single, RPE 8-9
    days:

      - day: Mon
        focus: Heavy Pull
        exercises:
          - name: Weighted Pull Up
            notes: Top triples then ramp. Last single is the heaviest clean rep of the day.
            sets:
              - reps: 3
                load_kg: 27
              - reps: 3
                load_kg: 27
              - reps: 3
                load_kg: 27
              - reps: 2
                load_kg: 32
                target_rpe: 8
              - reps: 1
                load_kg: 35
                target_rpe: 9
                notes: Clean - chin clearly over bar. Bail the rep if form drifts.
          - name: Weighted Pull Up - Supramaximal Eccentric
            notes: 4-5 sec lower. Heavier than Wk1.
            sets:
              - reps: 1
                load_kg: 45
              - reps: 1
                load_kg: 45
              - reps: 1
                load_kg: 45
          - name: Weighted Chin Up
            sets:
              - reps: 5
                load_kg: 17
              - reps: 5
                load_kg: 17

      - day: Tue
        focus: Push A - Heavy Dip
        exercises:
          - name: Weighted Dip
            notes: Add a rep vs Wk1.
            target_rpe: 8
            sets:
