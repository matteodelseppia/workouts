              - reps: 6
                load_kg: 35
              - reps: 6
                load_kg: 35
              - reps: 6
                load_kg: 35
          - name: Pike Push Up
            notes: Feet elevated.
            sets:
              - reps: 12
              - reps: 12
              - reps: 12
          - name: Lateral Raise
            sets:
              - reps: 15
                load_kg: 5
              - reps: 15
                load_kg: 6
              - reps: 15
                load_kg: 6

      - day: Thu
        focus: Volume Pull + horizontal
        exercises:
          - name: Weighted Pull Up
            target_rpe: 8
            sets:
              - reps: 6
                load_kg: 17
              - reps: 6
                load_kg: 17
              - reps: 6
                load_kg: 17
              - reps: 6
                load_kg: 17
          - name: Ring Row
            notes: Feet further forward than last week if 12 was easy.
            sets:
              - reps: 12
              - reps: 12
              - reps: 12
          - name: Tuck Front Lever Raise
            notes: Add a set. Still tucked, still controlled down.
            sets:
              - reps: 8
              - reps: 8
              - reps: 8
              - reps: 8
          - name: L Sit Pull Up
            sets:
              - reps: 7
              - reps: 6

      - day: Fri
        focus: Push B - volume + rear delt
        exercises:
          - name: Weighted Ring Dip
            sets:
              - reps: 8
                load_kg: 15
              - reps: 8
                load_kg: 15
              - reps: 7
                load_kg: 15
          - name: Archer Push Up
            sets:
              - reps: 11 each side
              - reps: 11 each side
              - reps: 10 each side
          - name: Ring Face Pull
            sets:
              - reps: 15
              - reps: 15
              - reps: 15
          - name: Bar Tricep Extension
            sets:
              - reps: to failure
              - reps: to failure
              - reps: to failure

      - day: Sat
        focus: Skill - light, quality only
        exercises:
          - name: Tuck Front Lever Hold
            sets:
              - duration_s: 14
              - duration_s: 14
              - duration_s: 14
          - name: L Sit Hold
            sets:
              - duration_s: 18
              - duration_s: 18
              - duration_s: 18
          - name: Scapular Pull Up
            sets:
              - reps: 10
              - reps: 10

  # ========================================================================
  - week: 3
    theme: Intensify - ramp to a new top single, RPE 9. Peak week.
    days:

      - day: Mon
        focus: Heavy Pull - the key session of the block
        exercises:
          - name: Weighted Pull Up
            notes: >
              Ramp singles. Rest 3-4 min between the heavy attempts.
              +38 is the target new clean-ish single. If +36 grinds hard, STOP there
              and bank it - do not chase a dirty +38.
            sets:
              - reps: 3
                load_kg: 25
                notes: Warm-up triple.
              - reps: 1
                load_kg: 33
                target_rpe: 7
              - reps: 1
                load_kg: 36
                target_rpe: 8
              - reps: 1
                load_kg: 38
                target_rpe: 9
                notes: Target single. Clean = chin clearly over bar, no kip.
          - name: Weighted Pull Up - Back-off Double
            notes: Reinforce strength with a couple of quality doubles after the singles.
            sets:
              - reps: 2
                load_kg: 30
              - reps: 2
                load_kg: 30
          - name: Weighted Pull Up - Top Hold
            notes: Chin-over-bar isometric. Builds the lockout that fails first at max.
            sets:
              - duration_s: 8
                load_kg: 20
              - duration_s: 8
                load_kg: 20

      - day: Tue
        focus: Push A - Heavy Dip (peak)
        exercises:
          - name: Weighted Dip
            notes: Heaviest dip of the block. Ramp into the working triples.
            sets:
              - reps: 5
                load_kg: 37.5
                target_rpe: 8
              - reps: 4
                load_kg: 40
                target_rpe: 9
              - reps: 4
                load_kg: 40
                target_rpe: 9
          - name: Pike Push Up
            sets:
              - reps: 12
              - reps: 12
              - reps: 12
          - name: Lateral Raise
            sets:
              - reps: 15
                load_kg: 6
              - reps: 15
                load_kg: 6
              - reps: 15
                load_kg: 6

      - day: Thu
        focus: Volume Pull - slightly reduced to recover from Mon
        exercises:
          - name: Weighted Pull Up
            target_rpe: 8
            sets:
              - reps: 5
                load_kg: 18
              - reps: 5
                load_kg: 18
              - reps: 5
                load_kg: 18
              - reps: 5
                load_kg: 18
          - name: Ring Row
            sets:
              - reps: 12
              - reps: 12
              - reps: 12
          - name: Tuck Front Lever Raise
            notes: If eccentrics are now controlled for all reps, try advanced-tuck (one knee extended) on the last set.
            sets:
              - reps: 8
              - reps: 8
              - reps: 8
