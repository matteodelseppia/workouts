            sets:
              - reps: 8
                load_kg: 15
              - reps: 8
                load_kg: 15
              - reps: 8
                load_kg: 15
          - name: Archer Push Up
            sets:
              - reps: 12 each side
              - reps: 11 each side
              - reps: 11 each side
          - name: Ring Face Pull
            sets:
              - reps: 15
              - reps: 15
              - reps: 15
          - name: Bar Tricep Extension
            sets:
              - reps: to failure
              - reps: to failure
              - reps: to failure

      - day: Sat
        focus: Skill - light, quality only
        exercises:
