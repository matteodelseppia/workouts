  - week: 4
    theme: Deload - shed fatigue, lock in the gains. ~50-60% volume, cap RPE 7.
    notes: Do NOT add load this week. The adaptation happens here. Optional clean retest single only if you feel fresh on Mon.
    days:

      - day: Mon
        focus: Light Pull + optional retest
        exercises:
          - name: Weighted Pull Up
            notes: Crisp, fast, easy. Leave 3+ reps in the tank.
            target_rpe: 6
            sets:
              - reps: 3
                load_kg: 22
              - reps: 3
                load_kg: 22
              - reps: 3
                load_kg: 22
          - name: Weighted Pull Up - Optional Retest
            notes: ONLY if fully recovered and reps above felt snappy. One attempt at a clean single. Skip if any doubt.
            optional: true
            sets:
              - reps: 1
                load_kg: 39
                target_rpe: 9

      - day: Tue
        focus: Light Push
        exercises:
          - name: Weighted Dip
            target_rpe: 6
            sets:
              - reps: 6
                load_kg: 30
              - reps: 6
                load_kg: 30
              - reps: 6
                load_kg: 30
          - name: Lateral Raise
            sets:
              - reps: 15
                load_kg: 5
              - reps: 15
                load_kg: 5

      - day: Thu
        focus: Light Volume Pull
        exercises:
          - name: Weighted Pull Up
            target_rpe: 6
            sets:
              - reps: 6
                load_kg: 12.5
              - reps: 6
                load_kg: 12.5
              - reps: 6
                load_kg: 12.5
          - name: Ring Row
            sets:
              - reps: 12
              - reps: 12
          - name: Tuck Front Lever Raise
            sets:
              - reps: 8
              - reps: 8

      - day: Fri
        focus: Light Push B
        exercises:
          - name: Weighted Ring Dip
            sets:
              - reps: 8
                load_kg: 12.5
              - reps: 8
                load_kg: 12.5
          - name: Ring Face Pull
            sets:
              - reps: 15
              - reps: 15
          - name: Bar Tricep Extension
            sets:
              - reps: to failure
              - reps: to failure

      - day: Sat
        focus: Skill - easy
        exercises:
          - name: Tuck Front Lever Hold
            sets:
              - duration_s: 12
              - duration_s: 12
          - name: L Sit Hold
            sets:
              - duration_s: 15
              - duration_s: 15

# ==========================================================================
# PROGRESSION LOGIC (how to run the next block)
# - If the Wk3 +38 single was CLEAN at RPE <=9: next block starts heavy singles
#   from +34 and ramps toward +41. You are on schedule.
# - If +38 GROUND (RPE 10 / form broke): repeat this block's intensities,
#   nudge volume-day load +1-2 kg only. No rush - +41 is a 12-week target.
# - Dip: if 3x4@40 moved well, push toward +42-43 for triples next block.
# - Add load to Ring Rows by elevating feet / adding a vest before adding reps.
# - Keep front lever TUCK until every eccentric rep is fully controlled,
#   then progress tuck -> advanced tuck -> one-leg, never by adding momentum.
# - Re-test pull 1RM no more than once every 3-4 weeks.
# ==========================================================================
