plan: Q3 2026 — Strength Block
period: 2026-07-04 to 2026-10-02 (13 weeks, weeks run Tue-Mon)
goal_lifts:
  pull_up_5x3: {start_kg: 28, target_kg: 32-34}
  dip_4x6: {start_kg: 38, target_kg: 44-46}
  ring_dip_3x6: {start_kg: 12.5, target_kg: 17.5-20}
  tuck_flr_max_set: {start_reps: 10, target_reps: 15-18}

schedule:
  - day: Tue — Heavy Pull
    exercises:
      - name: Weighted Pull Up
        scheme: 5x3
        start_kg: 28
        progression: +1kg per week when all 15 reps clean, chin clearly over bar. If a rep grinds, repeat load next week.
      - name: Weighted Chin Up
        scheme: 3x5
        start_kg: 17
        progression: reps 5->7, then +2.5kg
      - name: Australian Pull Up
        scheme: 3x failure
        notes: 1-2s squeeze at top.
      - name: Ring Face Pull
        scheme: 3x12-15

  - day: Thu — Heavy Push
    exercises:
      - name: Weighted Dip
        scheme: 4x6
        start_kg: 38
        progression: wave — build 4x6 to 4x8 at same load, then +2.5kg and back to 4x6.
      - name: Weighted Ring Dip
        scheme: 3x6
        start_kg: 12.5
        notes: Second slot, moderate effort here (heavy slot is Thursday).
      - name: Tuck Front Lever Raise
        scheme: 3 sets
        start_reps: 9
        progression: +1 total rep per week (9/9/8 -> 9/9/9 -> 10/9/9 ...). Last rep of each set: 5s eccentric.
      - name: Bar Tricep Extensions
        scheme: 3x10-12

  - day: Sat — Volume Pull
    exercises:
      - name: Weighted Pull Up
        scheme: 4x6
        start_kg: 18
        progression: reps 6->8 at same load, then +2kg back to 4x6. This drives Saturday.
      - name: Weighted Chin Up
        scheme: 2x8
        start_kg: 12.5
      - name: Australian Pull Up
        scheme: 4x failure
        notes: 1-2s squeeze.
      - name: Ring Face Pull
        scheme: 4x12-15

  - day: Sun — Push Volume / Ring Focus
    exercises:
      - name: Weighted Ring Dip
        scheme: 3x6
        start_kg: 15
        progression: +1.25-2.5kg when 3x6 stable, no elbow flare. FIRST slot, fresh.
        notes: This is the heavy ring dip exposure of the week.
      - name: Weighted Dip
        scheme: 3x8
        load: Thursday load minus 8-10kg
        notes: Speed and quality, not grind.
      - name: Tuck Front Lever Raise
        scheme: 3 sets
        notes: Same rep target as Thursday. Optional: 1 max-effort set instead, log it.
      - name: Archer Push Up
        scheme: 3x10 each side
      - name: Bar Tricep Extensions
        scheme: 3x10-12

deloads:
  - week: 7 (Aug 15-21)
    protocol: All lifts 2 sets at -20% load, no failure sets, no FLR eccentrics.
  - week: 13 (Sep 26 - Oct 2)
    protocol: Test week. Tue test 5x3 pull-up max + optional 1RM single. Thu test 4x6 dip. Sat test 3x6 ring dip + tuck FLR max-rep set.
